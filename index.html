<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gregoire Hennen - Tech Artist</title>
    <style>
        /* Un style de base pour tout centrer et faire un menu propre */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            padding: 40px 20px;
            background-color: #111111;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 2.5em;
        }
        h2 {
            margin: 0 0 20px 0;
            color: #00adb5;
            font-weight: 400;
        }
       nav a {
    position: relative;
    padding: 10px 20px;
    color: #fff;
    text-decoration: none;
    transition: color 0.3s;
}

/* La ligne animée */
nav a::after {
    content: '';
    position: absolute;
    bottom: 5px;
    left: 50%;
    width: 0;
    height: 2px;
    background: #00adb5;
    transition: all 0.3s ease;
}

/* État actif : la ligne s'étend */
nav a.active::after, nav a:hover::after {
    width: 70%;
    left: 15%;
}

nav a.active {
    color: #00adb5; /* On illumine juste le texte */
}
        /* Style de la barre de navigation (les boutons) */
        nav {
            margin-top: 20px;
        }
        nav a {
            display: inline-block;
            color: #ffffff;
            text-decoration: none;
            padding: 10px 20px;
            margin: 0 10px;
            border: 2px solid #00adb5;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        nav a:hover {
            background-color: #00adb5;
            color: #1a1a1a;
        }
        /* Style du contenu principal */
        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Gregoire Hennen</h1>
        <h2>Technical Artist</h2>
        
        <nav>
            <a href="index.html">Accueil</a>
            <a href="vfx.html">VFX</a>
            <a href="shaders.html">Shaders</a>
            <a href="tools.html">Tools</a>
            <a href="scripts.html">Scripts</a>
            <a href="lighting.html">Lighting</a>
        </nav>
    </header>

    <main>
        <h3>Bienvenue sur mon portfolio</h3>
        <p>Présentation de mes outils, shaders et VFX réalisés durant la jam de 3 semaines.</p>
        </main>
<script>
    // Récupère le nom de la page actuelle (ex: "shaders.html")
    const currentPage = window.location.pathname.split("/").pop();

    // Sélectionne tous les liens dans la nav
    const navLinks = document.querySelectorAll('nav a');

    navLinks.forEach(link => {
        // Si le href du lien correspond à la page actuelle, ajoute la classe "active"
        if (link.getAttribute('href') === currentPage) {
            link.classList.add('active');
        }
    });
</script>
</body>
</html>
