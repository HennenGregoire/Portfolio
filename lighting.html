<head>

    <style>
        /* Style pour le bouton actif */
nav a.active {
    background-color: #00adb5;
    color: #1a1a1a;
    border-color: #00adb5;
}
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: #ffffff; margin: 0; padding: 0; text-align: center; }
        header { padding: 40px 20px; background-color: #111111; }
        h1 { margin: 0 0 10px 0; font-size: 2.5em; }
        h2 { margin: 0 0 20px 0; color: #00adb5; font-weight: 400; }
        nav { margin-top: 20px; }
        nav a { display: inline-block; color: #ffffff; text-decoration: none; padding: 10px 20px; margin: 0 10px; border: 2px solid #00adb5; border-radius: 5px; font-weight: bold; transition: all 0.3s ease; }
        nav a:hover { background-color: #00adb5; color: #1a1a1a; }
        main { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    </style>
</head>
<body>
    <header>
        <h1>Gregoire Hennen</h1>
        <h2>Technical Artist</h2>
        <nav>
            <a href="index.html">Accueil</a>

            <a href="tools.html">Tools</a>

    <main>
        <h3>Voici mon Lighting</h3>
        <p>Présentation du travail sur l'ambiance lumineuse, le post-process et l'optimisation visuelle.</p>
    </main>
    <script>
    // Récupère le nom de la page actuelle (ex: "shaders.html")
    const currentPage = window.location.pathname.split("/").pop();

    // Sélectionne tous les liens dans la nav
    const navLinks = document.querySelectorAll('nav a');

    navLinks.forEach(link => {
        // Si le href du lien correspond à la page actuelle, ajoute la classe "active"
        if (link.getAttribute('href') === currentPage) {
            link.classList.add('active');
        }
    });
</script>
</body>
